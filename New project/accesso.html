<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso | Woki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <p class="section-label">Accesso</p>
      <h1 class="login-title">Inserisci email e password.</h1>
      <p class="login-text">
        Questa e' la pagina dedicata per accedere al progetto.
      </p>

      <form class="access-form" id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Inserisci la tua email">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Inserisci la tua password">

        <button class="cta secondary" type="submit">Accedi</button>
      </form>

      <p class="login-text">
        Non hai ancora un account?
        <a class="back-link" href="registrazione.html">Vai alla registrazione</a>
      </p>

      <a class="back-link" href="index.html">Torna alla home</a>
    </section>
  </main>

  <script>
    const loginForm = document.querySelector("#login-form");

    if (loginForm) {
      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sessionStorage.setItem("isLoggedIn", "true");
        window.location.href = "profilo.html";
      });
    }
  </script>
</body>
</html>
