<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistiche Domande | Woki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --stats-yes: #1f5eff;
      --stats-no: #ff8d6d;
      --stats-soft: #eef3fb;
    }

    .stats-page {
      padding: 24px 24px 72px;
    }

    .stats-shell {
      max-width: 1120px;
      margin: 0 auto;
    }

    .stats-hero,
    .stats-panel {
      border: 1px solid var(--line);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .stats-hero {
      padding: 34px;
      background:
        radial-gradient(circle at top right, rgba(31, 94, 255, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 243, 251, 0.94));
    }

    .stats-intro {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.75;
    }

    .stats-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .stats-reset {
      margin-top: 0;
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .stats-reset-status {
      margin-top: 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .stats-reset-status.is-error {
      color: #c14b29;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 26px;
    }

    .stats-strip-card {
      padding: 20px 22px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(31, 94, 255, 0.08);
    }

    .stats-strip-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 2rem;
      line-height: 1;
    }

    .stats-panel {
      margin-top: 24px;
      padding: 30px;
    }

    .stats-grid {
      display: grid;
      gap: 20px;
    }

    .stats-question-card {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 26px;
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 243, 251, 0.84));
      border: 1px solid rgba(31, 94, 255, 0.12);
    }

    .stats-question-copy h2 {
      margin-bottom: 10px;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      line-height: 1.08;
    }

    .stats-question-tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(31, 94, 255, 0.1);
      color: var(--stats-yes);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stats-question-copy p {
      color: var(--muted);
      line-height: 1.7;
    }

    .stats-chart-area {
      display: grid;
      place-items: center;
      padding: 8px 0;
    }

    .stats-donut {
      --yes-angle: 180deg;
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background:
        conic-gradient(
          var(--stats-yes) 0deg var(--yes-angle),
          var(--stats-no) var(--yes-angle) 360deg
        );
      box-shadow:
        inset 0 0 0 12px rgba(255, 255, 255, 0.65),
        0 18px 40px rgba(10, 24, 46, 0.14);
    }

    .stats-donut.is-empty {
      background: conic-gradient(#dfe7f8 0deg 360deg);
    }

    .stats-donut::after {
      content: "";
      position: absolute;
      inset: 34px;
      border-radius: 50%;
      background: white;
    }

    .stats-donut-center {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 700;
    }

    .stats-donut-center strong {
      display: block;
      font-size: 2.2rem;
      line-height: 1;
    }

    .stats-donut-center span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .stats-breakdown {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .stats-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .stats-metric {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
    }

    .stats-metric-value {
      display: block;
      margin-bottom: 6px;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .stats-metric-label {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .stats-breakdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
    }

    .stats-breakdown-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }

    .stats-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .stats-dot-yes {
      background: var(--stats-yes);
    }

    .stats-dot-no {
      background: var(--stats-no);
    }

    .stats-breakdown-value {
      text-align: right;
      color: var(--muted);
      font-weight: 500;
    }

    .stats-question-meta {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .stats-empty-note {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .stats-page {
        padding: 16px 16px 56px;
      }

      .stats-hero,
      .stats-panel {
        padding: 24px;
      }

      .stats-strip {
        grid-template-columns: 1fr;
      }

      .stats-question-card {
        grid-template-columns: 1fr;
      }

      .stats-chart-area {
        order: -1;
      }

      .stats-metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="stats-page">
    <section class="stats-shell">
      <div class="stats-hero">
        <p class="section-label">Statistiche</p>

        <div class="stats-actions">
          <a class="cta" href="domande.html">Apri il questionario</a>
          <button class="cta secondary stats-reset" type="button" data-reset-responses>Azzera risposte</button>
        </div>

        <p class="stats-reset-status" data-reset-status></p>
        <div class="stats-strip" data-stats-summary></div>
      </div>

      <div class="stats-panel">
        <div data-stats-content></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const responsesEndpoint = "/api/responses";
      const resetButton = document.querySelector("[data-reset-responses]");
      const resetStatus = document.querySelector("[data-reset-status]");
      const statsSummary = document.querySelector("[data-stats-summary]");
      const statsContent = document.querySelector("[data-stats-content]");

      const questions = [
        {
          id: "motivation",
          tag: "Domanda 1",
          title: "Ti piacerebbe dedicare del tempo per guadagnare qualcosa?",
          helper: "Distribuzione delle risposte alla prima domanda.",
        },
        {
          id: "availability",
          tag: "Domanda 2",
          title: "Quanto tempo riusciresti a dedicare?",
          helper: "Distribuzione delle risposte alla seconda domanda.",
        },
        {
          id: "next_step",
          tag: "Domanda 3",
          title: "Come preferisci andare avanti?",
          helper: "Distribuzione delle risposte alla terza domanda.",
        },
      ];

      const escapeHtml = (value) =>
        String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const readResponses = async () => {
        try {
          const response = await fetch(responsesEndpoint, {
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error("Load failed");
          }

          const parsed = await response.json();
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      };

      const setResetStatus = (message, isError = false) => {
        resetStatus.textContent = message;
        resetStatus.classList.toggle("is-error", isError);
      };

      const countAnswer = (responses, questionId, expectedAnswer) =>
        responses.filter((entry) => (entry?.answers?.[questionId] || "").toLowerCase() === expectedAnswer.toLowerCase()).length;

      const renderSummary = (responses) => {
        const totalResponses = responses.length;
        const totalYes = questions.reduce((sum, question) => sum + countAnswer(responses, question.id, "Si'"), 0);
        const totalNo = questions.reduce((sum, question) => sum + countAnswer(responses, question.id, "No"), 0);

        statsSummary.innerHTML = `
          <div class="stats-strip-card">
            <strong>${totalResponses}</strong>
            <span>Questionari completati</span>
          </div>
          <div class="stats-strip-card">
            <strong>${totalYes}</strong>
            <span>Totale risposte SI'</span>
          </div>
          <div class="stats-strip-card">
            <strong>${totalNo}</strong>
            <span>Totale risposte NO</span>
          </div>
        `;
      };

      const renderCharts = async () => {
        const responses = await readResponses();
        renderSummary(responses);

        statsContent.innerHTML = `
          <div class="stats-grid">
            ${questions
              .map((question, index) => {
                const yesCount = countAnswer(responses, question.id, "Si'");
                const noCount = countAnswer(responses, question.id, "No");
                const total = yesCount + noCount;
                const yesPercent = total ? Math.round((yesCount / total) * 100) : 0;
                const noPercent = total ? 100 - yesPercent : 0;
                const yesDegrees = total ? (yesCount / total) * 360 : 0;
                const dominantAnswer =
                  total === 0 ? "Nessuna risposta" : yesCount === noCount ? "Parita'" : yesCount > noCount ? "SI'" : "NO";

                return `
                  <article class="stats-question-card">
                    <div class="stats-chart-area">
                      <div class="stats-donut${total === 0 ? " is-empty" : ""}" style="--yes-angle: ${yesDegrees}deg;">
                        <div class="stats-donut-center">
                          <div>
                            <strong>${total}</strong>
                            <span>risposte</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="stats-question-copy">
                      <span class="stats-question-tag">${escapeHtml(question.tag)}</span>
                      <h2>${escapeHtml(question.title)}</h2>
                      <p>${escapeHtml(question.helper)}</p>

                      <div class="stats-metrics">
                        <div class="stats-metric">
                          <span class="stats-metric-value">${total}</span>
                          <span class="stats-metric-label">Risposte raccolte</span>
                        </div>
                        <div class="stats-metric">
                          <span class="stats-metric-value">${dominantAnswer}</span>
                          <span class="stats-metric-label">Risposta prevalente</span>
                        </div>
                        <div class="stats-metric">
                          <span class="stats-metric-value">${yesPercent}%</span>
                          <span class="stats-metric-label">Percentuale SI'</span>
                        </div>
                        <div class="stats-metric">
                          <span class="stats-metric-value">${noPercent}%</span>
                          <span class="stats-metric-label">Percentuale NO</span>
                        </div>
                      </div>

                      <div class="stats-breakdown">
                        <div class="stats-breakdown-item">
                          <span class="stats-breakdown-label">
                            <span class="stats-dot stats-dot-yes"></span>
                            SI'
                          </span>
                          <span class="stats-breakdown-value">${yesCount} risposte | ${yesPercent}%</span>
                        </div>
                        <div class="stats-breakdown-item">
                          <span class="stats-breakdown-label">
                            <span class="stats-dot stats-dot-no"></span>
                            NO
                          </span>
                          <span class="stats-breakdown-value">${noCount} risposte | ${noPercent}%</span>
                        </div>
                      </div>

                      <p class="stats-question-meta">
                        Totale conteggiato per questa domanda: ${total}.
                      </p>

                      ${total === 0
                        ? `<p class="stats-empty-note">Nessuna risposta ancora per questa domanda.</p>`
                        : ""}
                    </div>
                  </article>
                `;
              })
              .join("")}
          </div>
        `;
      };

      resetButton.addEventListener("click", async () => {
        const shouldReset = window.confirm("Vuoi davvero azzerare tutte le risposte raccolte?");

        if (!shouldReset) {
          return;
        }

        resetButton.disabled = true;
        resetButton.textContent = "Azzeramento...";
        setResetStatus("");

        try {
          const response = await fetch(responsesEndpoint, {
            method: "DELETE",
          });

          if (!response.ok) {
            throw new Error("Reset failed");
          }

          await renderCharts();
          setResetStatus("Le risposte sono state azzerate.");
        } catch (error) {
          setResetStatus("Non sono riuscito ad azzerare le risposte. Riprova tra poco.", true);
        } finally {
          resetButton.disabled = false;
          resetButton.textContent = "Azzera risposte";
        }
      });

      renderCharts();
    })();
  </script>
</body>
</html>
