<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Stabile | Woki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .qr-page {
      padding: 24px 24px 72px;
    }

    .qr-shell {
      max-width: 1120px;
      margin: 0 auto;
    }

    .qr-hero,
    .qr-panel {
      border: 1px solid var(--line);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .qr-hero {
      padding: 34px;
      background:
        radial-gradient(circle at top right, rgba(31, 94, 255, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 243, 251, 0.94));
    }

    .qr-hero p {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.7;
    }

    .qr-note {
      margin-top: 16px;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(31, 94, 255, 0.08);
      color: var(--accent-dark);
      font-weight: 500;
      line-height: 1.6;
    }

    .qr-panel {
      margin-top: 24px;
      padding: 28px;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .qr-card {
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 243, 251, 0.84));
      border: 1px solid rgba(31, 94, 255, 0.12);
    }

    .qr-card h2 {
      margin-bottom: 8px;
      font-size: 1.45rem;
      line-height: 1.1;
    }

    .qr-card p {
      color: var(--muted);
      line-height: 1.6;
    }

    .qr-image-wrap {
      display: grid;
      place-items: center;
      min-height: 320px;
      margin: 20px 0 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px dashed rgba(31, 94, 255, 0.22);
    }

    .qr-image {
      width: min(100%, 280px);
      aspect-ratio: 1;
      object-fit: contain;
      border-radius: 20px;
      background: white;
      padding: 14px;
    }

    .qr-placeholder {
      max-width: 260px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .qr-link {
      word-break: break-word;
      color: var(--accent-dark);
      font-weight: 700;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .qr-page {
        padding: 16px 16px 56px;
      }

      .qr-hero,
      .qr-panel {
        padding: 24px;
      }

      .qr-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="qr-page">
    <section class="qr-shell">
      <div class="qr-hero">
        <h1>QR stabile</h1>
        <p>
          Questa pagina serve per creare i QR definitivi quando avrai un link fisso, per esempio
          `onrender.com`. Una volta aggiornato il file `link_stabile.js`, i QR qui sotto punteranno
          sempre agli indirizzi corretti.
        </p>
        <div class="qr-note" data-qr-note></div>
      </div>

      <div class="qr-panel">
        <div class="qr-grid" data-qr-grid></div>
      </div>
    </section>
  </main>

  <script src="link_stabile.js"></script>
  <script>
    (() => {
      const note = document.querySelector("[data-qr-note]");
      const grid = document.querySelector("[data-qr-grid]");
      const links = window.STABLE_LINKS || {};
      const entries = [
        {
          key: "domande",
          title: "QR Domande",
          helper: "Usa questo QR per aprire direttamente il questionario.",
        },
        {
          key: "statistiche",
          title: "QR Statistiche",
          helper: "Usa questo QR per aprire la pagina delle statistiche.",
        },
      ];

      const escapeHtml = (value) =>
        String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const isPlaceholder = (value) => !value || value.includes("INSERISCI-QUI-IL-LINK-ONRENDER");

      const qrImageUrl = (value) =>
        `https://api.qrserver.com/v1/create-qr-code/?size=320x320&format=png&data=${encodeURIComponent(value)}`;

      const hasStableLinks = entries.every((entry) => !isPlaceholder(links[entry.key]));

      note.textContent = hasStableLinks
        ? "I QR qui sotto stanno gia' usando il link stabile configurato."
        : "Per attivarli, apri link_stabile.js e sostituisci il testo di esempio con il vero link onrender.com.";

      grid.innerHTML = entries
        .map((entry) => {
          const value = links[entry.key] || "";
          const ready = !isPlaceholder(value);

          return `
            <article class="qr-card">
              <h2>${escapeHtml(entry.title)}</h2>
              <p>${escapeHtml(entry.helper)}</p>
              <div class="qr-image-wrap">
                ${
                  ready
                    ? `<img class="qr-image" src="${qrImageUrl(value)}" alt="${escapeHtml(entry.title)}">`
                    : `<div class="qr-placeholder">Inserisci prima il vero link stabile in <strong>link_stabile.js</strong></div>`
                }
              </div>
              <p class="qr-link">${escapeHtml(value || "Link non ancora configurato")}</p>
            </article>
          `;
        })
        .join("");
    })();
  </script>
</body>
</html>
