<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifica Profilo | Woki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="subpage-header">
    <nav class="navbar">
      <a class="brand" href="index.html#home">Woki</a>

      <button class="menu-toggle" aria-expanded="false" aria-controls="nav-menu">
        Menu
      </button>

      <div class="nav-links" id="nav-menu">
        <a href="index.html#home">Home</a>
        <a href="index.html#about">Chi siamo</a>
        <a href="index.html#gallery">Galleria</a>
        <div class="nav-dropdown">
          <button class="nav-dropdown-toggle" type="button" aria-expanded="false">
            Categorie
          </button>
          <div class="nav-dropdown-menu">
            <a href="babysitting.html">Babysitting</a>
            <a href="petsitting.html">Petsitting</a>
            <a href="traslochi.html">Traslochi</a>
          </div>
        </div>
        <a href="chat.html">Chat</a>
        <a class="nav-button" href="accesso.html" id="account-link">Accedi</a>
      </div>
    </nav>
  </header>

  <main class="login-page profile-edit-page">
    <section class="login-card profile-edit-card">
      <p class="section-label">Modifica profilo</p>
      <h1 class="login-title">Aggiorna i tuoi dati personali.</h1>
      <p class="login-text">
        Modifica le informazioni principali del tuo profilo e poi premi salva.
      </p>

      <form class="access-form" id="profile-edit-form">
        <label for="display-name">Nome visualizzato</label>
        <input id="display-name" name="display-name" type="text" autocomplete="name">

        <label for="handle">Username</label>
        <input id="handle" name="handle" type="text" placeholder="@username">

        <label for="role">Ruolo</label>
        <input id="role" name="role" type="text" placeholder="Es. Babysitter">

        <label for="city">Citta</label>
        <input id="city" name="city" type="text" placeholder="Es. Milano">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email">

        <label for="interests">Interessi</label>
        <input id="interests" name="interests" type="text" placeholder="Es. Foto, contenuti, animali">

        <label for="goal">Obiettivo</label>
        <input id="goal" name="goal" type="text" placeholder="Es. Trovare nuovi clienti">

        <label for="status">Stato</label>
        <input id="status" name="status" type="text" placeholder="Es. Profilo attivo">

        <label for="bio">Bio breve</label>
        <textarea id="bio" name="bio" rows="4" placeholder="Scrivi una breve presentazione"></textarea>

        <label for="intro-text">Testo presentazione</label>
        <textarea id="intro-text" name="intro-text" rows="6" placeholder="Scrivi il testo completo del profilo"></textarea>

        <div class="camera-actions">
          <a class="cta secondary" href="profilo.html">Annulla</a>
          <button class="cta" type="submit">Salva</button>
        </div>

        <p class="verify-note hidden" id="profile-save-note">Profilo salvato con successo.</p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
